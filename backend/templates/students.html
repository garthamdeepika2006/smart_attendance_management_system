<!DOCTYPE html>
<html>
<head>
<title>Students</title>
</head>
<body>

<h2>Registered Students</h2>

{% for s in students %}

<div style="border:1px solid #ccc;padding:15px;margin:10px">

<h3>{{ s.name }}</h3>

<p>{{ s.roll_no }}</p>

<img
src="{{ s.image }}"
width="200">

</div>

{% endfor %}

</body>
</html>
